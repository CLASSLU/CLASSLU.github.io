name: Update OpenClaw Status

on:
  workflow_dispatch:
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync-status:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch public status
        env:
          OPENCLAW_STATUS_URL: ${{ secrets.OPENCLAW_STATUS_URL }}
        run: |
          if [ -z "$OPENCLAW_STATUS_URL" ]; then
            echo "OPENCLAW_STATUS_URL is not configured, skip."
            exit 0
          fi

          curl -fsSL "$OPENCLAW_STATUS_URL" -o data/openclaw-status.json
          jq . data/openclaw-status.json > /dev/null

      - name: Commit if changed
        run: |
          if git diff --quiet data/openclaw-status.json; then
            echo "No status changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/openclaw-status.json
          git commit -m "chore: sync openclaw public status"
          git push
